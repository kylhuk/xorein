name: Nightly
on:
  schedule:
    - cron: '0 3 * * *'
jobs:
  nightly-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Run full check
        run: make check-full
