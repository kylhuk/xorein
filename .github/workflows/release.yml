name: Release
on:
  workflow_dispatch:
jobs:
  release:
    name: Release preparation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Run build
        run: make build
