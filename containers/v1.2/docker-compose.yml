version: "3.9"

services:
  relay-baseline-v12:
    image: docker.io/library/golang:1.24.12
    command:
      [
        "/workspace/bin/aether",
        "--mode",
        "relay",
        "--relay-listen",
        "0.0.0.0:4001",
        "--relay-store",
        "/workspace/artifacts/generated/v12-recovery-scenarios/stores",
        "--relay-persistence-mode",
        "session-metadata",
        "--relay-health-interval",
        "10ms",
        "--profile",
        "v12-recovery",
      ]
    user: "1000:1000"
    working_dir: /workspace
    volumes:
      - ../..:/workspace:Z
    ports:
      - "4001:4001"
    restart: "no"
    networks:
      - relay-net

networks:
  relay-net:
    driver: bridge
