name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    name: CI check matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [fast, full]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman version
      - name: Run profile target
        run: |
          if [[ "${{ matrix.profile }}" == "fast" ]]; then
            make check-fast
          else
            make check-full
          fi
