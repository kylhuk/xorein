version: '3.9'

services:
  relay-baseline:
    image: docker.io/library/golang:1.24.12
    working_dir: /workspace
    volumes:
      - ../..:/workspace:Z
    command:
      - /workspace/bin/aether
      - --mode
      - relay
      - --relay-listen
      - 0.0.0.0:4001
      - --relay-store
      - /workspace/artifacts/generated/v11-relay-smoke
      - --relay-persistence-mode
      - session-metadata
      - --relay-health-interval
      - 10ms
      - --profile
      - v11-smoke
    ports:
      - "4001:4001"
    restart: "no"
    networks:
      - relay-net

networks:
  relay-net:
    driver: bridge
