name: Security Audit
on:
  schedule:
    - cron: '0 1 * * 1'
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Run scan target
        run: make scan
